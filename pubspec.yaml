name: hack2026
description: "Sacred KG — sacred places and tourist routes of Kyrgyzstan."
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/branding/
    - assets/images/places/
    - assets/images/regions/
    - assets/images/CREDITS.json
